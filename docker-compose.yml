# Werkstatt-Termin – Produktion (z. B. DigitalOcean Droplet mit Docker)
#
# Schnellstart auf dem Server:
#   chmod +x start.sh && ./start.sh
#
# Alternativ: docker compose up -d --build
# Ein Container (Nginx + Frontend + Backend): docker-compose.one.yml → ./start.sh install-one
#
# Ohne .env.docker: Einrichtungs-Wizard (Link in den Logs, ./start.sh wizard-hinweis).
# Mit Datei: cp .env.docker.example .env.docker  (optional PUBLIC_APP_URL für Log-Link)
#
# Datenbank + Medien liegen im Volume `werkstatt_data` unter /app/data im Backend-Container.

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: production
      PORT: "4100"
      DATABASE_PATH: /app/data/werkstatt.sqlite
    volumes:
      - werkstatt_data:/app/data
    expose:
      - "4100"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  werkstatt_data:
